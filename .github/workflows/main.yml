name: Build Caserita App APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias de sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libgst-dev libnm-dev libpulse-dev

      - name: Instalar Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Build APK
        run: |
          flet build apk --main caseritaapp.py

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/apk/*.apk
